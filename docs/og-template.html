<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>omniscitus OG</title>
<style>
  html, body { margin: 0; padding: 0; width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: radial-gradient(circle at 30% 40%, rgba(124,58,237,0.18), transparent 60%),
                radial-gradient(circle at 80% 80%, rgba(110,231,183,0.10), transparent 60%),
                #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 64px 72px; box-sizing: border-box;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-dot { width: 12px; height: 12px; border-radius: 50%; background: #6ee7b7; box-shadow: 0 0 14px #6ee7b7; }
  .brand-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .brand-sub { font-size: 14px; color: #9ca3af; font-style: italic; margin-top: 4px; }
  .thesis { font-size: 88px; font-weight: 700; letter-spacing: -2px; line-height: 1.05; margin: 0; }
  .thesis span { color: #c4b5fd; }
  .subline { font-size: 22px; color: #9ca3af; margin-top: 20px; max-width: 920px; line-height: 1.45; }
  .footer { display: flex; justify-content: space-between; align-items: flex-end; font-size: 16px; color: #6b7280; }
  .footer .right { color: #93c5fd; }
</style>
</head>
<body>
  <div class="brand">
    <span class="brand-dot"></span>
    <div>
      <div class="brand-name">omniscitus</div>
      <div class="brand-sub">Latin: "the one who knows all"</div>
    </div>
  </div>
  <div>
    <h1 class="thesis">Model changes.<br><span>Records compound.</span></h1>
    <p class="subline">The record layer for AI-driven production. A Claude Code plugin that auto-tracks files, sessions, tests, and team decisions.</p>
  </div>
  <div class="footer">
    <span>omniscitus.vercel.app</span>
    <span class="right">github.com/DanialDaeHyunNam/omniscitus</span>
  </div>
</body>
</html>
