<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<title>History - Birdview</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{background:#0d0d0d;color:#e0e0e0;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  .container{max-width:1100px;margin:0 auto;padding:24px}
  a{color:#93c5fd;text-decoration:none}
  a:hover{text-decoration:underline}

  .header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #252525}
  .back{color:#9ca3af;font-size:14px;display:flex;align-items:center;gap:4px;text-decoration:none}
  .back:hover{color:#e0e0e0}
  .header h1{font-size:24px;font-weight:700;margin:0;color:#fff}

  .layout{display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:start}
  @media(max-width:768px){.layout{grid-template-columns:1fr}}

  .sidebar{background:#1a1a1a;border-radius:12px;padding:12px 0;border:1px solid #252525;position:sticky;top:24px}
  .sidebar-title{padding:8px 16px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:#6b7280;font-weight:600}
  .domain-item{padding:8px 16px;font-size:14px;cursor:pointer;transition:background 0.1s;display:flex;justify-content:space-between;align-items:center}
  .domain-item:hover{background:#222}
  .domain-item.active{background:#1e3a5f;color:#93c5fd}
  .domain-count{font-size:11px;background:#252525;color:#9ca3af;padding:1px 6px;border-radius:10px;font-variant-numeric:tabular-nums}
  .domain-item.active .domain-count{background:#1a365d;color:#93c5fd}

  .main{min-width:0}
  .unit-grid{display:flex;flex-direction:column;gap:12px}

  .unit-card{background:#1a1a1a;border-radius:12px;padding:20px;border:1px solid #252525;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s}
  .unit-card:hover{border-color:#374151;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
  .unit-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .unit-title{font-size:16px;font-weight:600;color:#fff;margin:0}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500}
  .badge-open{background:#064e3b;color:#6ee7b7}
  .badge-closed{background:#1a1a1a;color:#9ca3af;border:1px solid #374151}
  .badge-domain{background:#1e293b;color:#94a3b8;font-size:11px}
  .unit-meta{display:flex;gap:16px;font-size:12px;color:#6b7280}
  .unit-meta span{display:flex;align-items:center;gap:4px}

  .unit-detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:48px 24px;overflow-y:auto;animation:overlayFade 0.15s ease-out}
  .unit-detail-overlay.visible{display:flex}
  @keyframes overlayFade{from{opacity:0}to{opacity:1}}
  @keyframes modalRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .unit-detail{background:#111;border:1px solid #252525;border-radius:14px;padding:32px 36px;max-width:780px;width:100%;max-height:none;position:relative;box-shadow:0 24px 64px rgba(0,0,0,0.6);animation:modalRise 0.2s ease-out;margin:auto 0}
  .unit-detail-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#6b7280;font-size:24px;line-height:1;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background 0.15s,color 0.15s}
  .unit-detail-close:hover{color:#e0e0e0;background:#1f1f1f}
  .unit-detail h2{font-size:20px;color:#fff;margin:0 0 16px;padding-right:32px}

  .md-content{line-height:1.7;font-size:14px;color:#d1d5db}
  .md-content h1{font-size:20px;color:#fff;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid #252525}
  .md-content h2{font-size:16px;color:#c4b5fd;margin:20px 0 8px}
  .md-content h3{font-size:14px;color:#6ee7b7;margin:16px 0 6px}
  .md-content h4{font-size:13px;color:#fbbf24;margin:14px 0 4px}
  .md-content p{margin:8px 0}
  .md-content ul,.md-content ol{padding-left:22px;margin:8px 0}
  .md-content li{margin:4px 0}
  .md-content strong{color:#fff;font-weight:600}
  .md-content em{color:#e0e0e0;font-style:italic}
  .md-content del{color:#6b7280;text-decoration:line-through}
  .md-content a{color:#7dd3fc;text-decoration:underline;text-underline-offset:2px}
  .md-content a:hover{color:#bae6fd}
  .md-content code{background:#1f1f23;color:#fbbf24;padding:1px 6px;border-radius:4px;font-size:12px;font-family:'SF Mono',SFMono-Regular,Menlo,monospace}
  .md-content pre{background:#0a0a0a;border:1px solid #252525;border-radius:8px;padding:14px 16px;margin:12px 0;overflow-x:auto;font-size:12.5px;line-height:1.55}
  .md-content pre code{background:transparent;color:#e0e0e0;padding:0;font-size:12.5px}
  .md-content blockquote{border-left:3px solid #7c3aed;padding:4px 14px;margin:12px 0;color:#9ca3af;background:rgba(124,58,237,0.06);border-radius:0 6px 6px 0}
  .md-content blockquote p{margin:4px 0}
  .md-content hr{border:none;border-top:1px solid #252525;margin:20px 0}

  .timeline-visual{border-left:2px solid #333;margin-left:8px;padding-left:20px}
  .tl-date-header{position:relative;font-size:13px;font-weight:600;color:#6ee7b7;margin:16px 0 8px}
  .tl-date-header::before{content:'';position:absolute;left:-25px;top:5px;width:10px;height:10px;border-radius:50%;background:#6ee7b7;border:2px solid #0d0d0d}
  .tl-focus{font-size:13px;color:#d1d5db;margin:4px 0}
  .tl-items{font-size:12px;color:#9ca3af;padding-left:16px;margin:4px 0}
  .tl-items li{margin:2px 0}
  .tl-learned{font-size:12px;color:#fbbf24;font-style:italic;margin:4px 0}

  .pending-list{list-style:none;padding:0;margin:8px 0}
  .pending-list li{padding:4px 0;font-size:13px;display:flex;align-items:center;gap:8px}
  .pending-list li::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid #374151;border-radius:3px;flex-shrink:0}
  .pending-list li.done::before{background:#064e3b;border-color:#6ee7b7}

  .empty{text-align:center;padding:48px 24px;color:#6b7280}
  .empty-icon{font-size:32px;margin-bottom:12px}

  .toast-container{position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px}
  .toast{padding:10px 16px;border-radius:8px;font-size:13px;animation:toastIn 0.3s ease;background:#1a1a1a;border:1px solid #333}
  .toast-error{border-color:#7f1d1d;color:#f87171}
  .toast-info{border-color:#1e3a5f;color:#93c5fd}
  @keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

  /* ── Review System ── */
  .review-fab{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#6366f1);border:none;color:white;font-size:20px;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,0.4);z-index:900;display:flex;align-items:center;justify-content:center;transition:transform 0.15s}
  .review-fab:hover{transform:scale(1.1)}
  .review-fab .badge-count{position:absolute;top:-4px;right:-4px;background:#f87171;color:white;font-size:11px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:600}
  .review-panel{position:fixed;top:0;right:-400px;width:400px;height:100vh;background:#111;border-left:1px solid #252525;z-index:1000;transition:right 0.25s ease;display:flex;flex-direction:column}
  .review-panel.open{right:0}
  .review-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:none}
  .review-overlay.open{display:block}
  .review-panel-header{padding:16px 20px;border-bottom:1px solid #252525;display:flex;align-items:center;gap:10px}
  .review-panel-header h3{font-size:16px;font-weight:600;color:#fff;margin:0;flex:1}
  .review-panel-close{background:none;border:none;color:#6b7280;font-size:20px;cursor:pointer;padding:0}
  .review-panel-close:hover{color:#e0e0e0}
  .review-list{flex:1;overflow-y:auto;padding:12px 16px}
  .review-item{background:#1a1a1a;border:1px solid #252525;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:opacity 0.15s}
  .review-item.resolved{opacity:0.5}
  .review-item.resolved .review-comment{text-decoration:line-through}
  .review-author{font-size:12px;font-weight:600;color:#c4b5fd}
  .review-time{font-size:11px;color:#6b7280;margin-left:8px}
  .review-context{font-size:11px;color:#9ca3af;margin:4px 0;font-family:'SF Mono',SFMono-Regular,Menlo,monospace}
  .review-comment{font-size:13px;color:#d1d5db;line-height:1.5;margin-top:4px}
  .review-resolved-tag{font-size:10px;color:#6ee7b7;margin-left:6px}
  .review-form{border-top:1px solid #252525;padding:16px;display:flex;flex-direction:column;gap:10px}
  .review-form input,.review-form textarea{width:100%;padding:8px 10px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:13px;font-family:inherit;outline:none}
  .review-form input:focus,.review-form textarea:focus{border-color:#7c3aed}
  .review-form textarea{resize:vertical;min-height:60px}
  .review-form button{padding:8px 16px;background:#7c3aed;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500}
  .review-form button:hover{background:#6d28d9}
  .review-form button:disabled{background:#3b1d6e;color:#6b7280;cursor:not-allowed}
  .review-empty{text-align:center;padding:24px;color:#6b7280;font-size:13px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="/" class="back">&larr; Birdview</a>
    <h1>&#x1F4D7; History</h1>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-title">Domains</div>
      <div id="domains">
        <div class="domain-item active" data-domain="all">
          <span>All</span>
          <span class="domain-count" id="all-count">0</span>
        </div>
      </div>
    </div>
    <div class="main">
      <div class="unit-grid" id="units"></div>
      <div class="empty" id="empty" style="display:none">
        <div class="empty-icon">&#x1F4ED;</div>
        <p>No history units found. Run <code>/wrap-up</code> to record a session.</p>
      </div>
    </div>
  </div>

  <div class="unit-detail-overlay" id="detail-overlay">
    <div class="unit-detail" id="detail" role="dialog" aria-modal="true">
      <button class="unit-detail-close" id="detail-close" aria-label="Close">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<!-- Review FAB + Panel -->
<button class="review-fab" id="review-fab">&#x1F4AC;<span class="badge-count" id="review-count" style="display:none">0</span></button>
<div class="review-overlay" id="review-overlay"></div>
<div class="review-panel" id="review-panel">
  <div class="review-panel-header"><h3>Reviews for this page</h3><button class="review-panel-close" id="review-panel-close">&times;</button></div>
  <div class="review-list" id="review-list"></div>
  <div class="review-form" id="review-form">
    <input type="text" id="review-context" placeholder="Context (unit name, domain, etc.)" />
    <input type="text" id="review-author" placeholder="Your name" />
    <textarea id="review-comment" placeholder="Leave a review or comment..."></textarea>
    <button id="review-submit">Submit Review</button>
  </div>
</div>

<script>
function esc(s) {
  if (s == null) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(s)));
  return div.innerHTML;
}
function escAttr(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast toast-' + (type || 'info');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(function() { el.remove(); }, 4000);
}

var allUnits = [];
var allDomains = [];
var activeDomain = 'all';

function renderDomains() {
  var container = document.getElementById('domains');
  var domainCounts = {};
  for (var i = 0; i < allUnits.length; i++) {
    var d = allUnits[i].domain || 'other';
    domainCounts[d] = (domainCounts[d] || 0) + 1;
  }

  var html = '<div class="domain-item' + (activeDomain === 'all' ? ' active' : '') + '" data-domain="all"><span>All</span><span class="domain-count">' + allUnits.length + '</span></div>';
  for (var j = 0; j < allDomains.length; j++) {
    var dom = allDomains[j];
    var cnt = domainCounts[dom] || 0;
    html += '<div class="domain-item' + (activeDomain === dom ? ' active' : '') + '" data-domain="' + escAttr(dom) + '">';
    html += '<span>' + esc(dom) + '</span>';
    html += '<span class="domain-count">' + cnt + '</span></div>';
  }
  container.innerHTML = html;
}

function renderUnits() {
  var container = document.getElementById('units');
  var empty = document.getElementById('empty');

  var filtered = allUnits.filter(function(u) {
    return activeDomain === 'all' || u.domain === activeDomain;
  });

  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var u = filtered[i];
    html += '<div class="unit-card" data-idx="' + i + '" data-id="' + escAttr(u.id) + '">';
    html += '<div class="unit-card-header">';
    html += '<h3 class="unit-title">' + esc(u.title || u.id) + '</h3>';
    html += '<span class="badge badge-' + esc(u.status) + '">' + esc(u.status) + '</span>';
    html += '<span class="badge badge-domain">' + esc(u.domain) + '</span>';
    html += '</div>';
    html += '<div class="unit-meta">';
    html += '<span>' + esc(u.session_count) + ' session' + (u.session_count !== 1 ? 's' : '') + '</span>';
    html += '<span>' + esc(u.created) + ' &rarr; ' + esc(u.last_updated) + '</span>';
    html += '</div>';
    html += '</div>';
  }
  container.innerHTML = html;
}

function renderMarkdown(md) {
  if (!md) return '<p style="color:#6b7280">No content available.</p>';
  var lines = md.split('\n');
  var html = '';
  var listStack = []; // stack of 'ul' | 'ol' | 'pending'
  var inBlockquote = false;
  var inCodeBlock = false;
  var codeLang = '';
  var codeBuffer = [];

  function closeLists() {
    while (listStack.length) html += '</' + listStack.pop().replace('pending', 'ul') + '>';
  }
  function closeBlockquote() {
    if (inBlockquote) { html += '</blockquote>'; inBlockquote = false; }
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];

    // ── fenced code block ────────────────────────────────────
    var fenceOpen = line.match(/^```(\w*)\s*$/);
    if (fenceOpen && !inCodeBlock) {
      closeLists(); closeBlockquote();
      inCodeBlock = true;
      codeLang = fenceOpen[1] || '';
      codeBuffer = [];
      continue;
    }
    if (line.match(/^```\s*$/) && inCodeBlock) {
      var langAttr = codeLang ? ' class="lang-' + esc(codeLang) + '"' : '';
      html += '<pre><code' + langAttr + '>' + esc(codeBuffer.join('\n')) + '</code></pre>';
      inCodeBlock = false;
      codeLang = '';
      codeBuffer = [];
      continue;
    }
    if (inCodeBlock) { codeBuffer.push(line); continue; }

    // ── horizontal rule ──────────────────────────────────────
    if (line.match(/^(---+|\*\*\*+|___+)\s*$/)) {
      closeLists(); closeBlockquote();
      html += '<hr>';
      continue;
    }

    // ── headings ─────────────────────────────────────────────
    var h4 = line.match(/^####\s+(.+)/);
    if (h4) { closeLists(); closeBlockquote(); html += '<h4>' + inlineFormat(h4[1]) + '</h4>'; continue; }
    var h3 = line.match(/^###\s+(.+)/);
    if (h3) { closeLists(); closeBlockquote(); html += '<h3>' + inlineFormat(h3[1]) + '</h3>'; continue; }
    var h2 = line.match(/^##\s+(.+)/);
    if (h2) { closeLists(); closeBlockquote(); html += '<h2>' + inlineFormat(h2[1]) + '</h2>'; continue; }
    var h1 = line.match(/^#\s+(.+)/);
    if (h1) { closeLists(); closeBlockquote(); html += '<h1>' + inlineFormat(h1[1]) + '</h1>'; continue; }

    // ── blockquote ───────────────────────────────────────────
    var bq = line.match(/^>\s?(.*)/);
    if (bq) {
      closeLists();
      if (!inBlockquote) { html += '<blockquote>'; inBlockquote = true; }
      html += '<p>' + inlineFormat(bq[1]) + '</p>';
      continue;
    }
    closeBlockquote();

    // ── checkbox list ────────────────────────────────────────
    var checkLi = line.match(/^[-*]\s+\[([x ])\]\s+(.+)/);
    if (checkLi) {
      if (listStack[listStack.length - 1] !== 'pending') {
        closeLists();
        html += '<ul class="pending-list">';
        listStack.push('pending');
      }
      html += '<li class="' + (checkLi[1] === 'x' ? 'done' : '') + '">' + inlineFormat(checkLi[2]) + '</li>';
      continue;
    }

    // ── unordered list ───────────────────────────────────────
    var ulLi = line.match(/^[-*]\s+(.+)/);
    if (ulLi) {
      if (listStack[listStack.length - 1] !== 'ul') {
        closeLists();
        html += '<ul>';
        listStack.push('ul');
      }
      html += '<li>' + inlineFormat(ulLi[1]) + '</li>';
      continue;
    }

    // ── ordered list ─────────────────────────────────────────
    var olLi = line.match(/^\d+\.\s+(.+)/);
    if (olLi) {
      if (listStack[listStack.length - 1] !== 'ol') {
        closeLists();
        html += '<ol>';
        listStack.push('ol');
      }
      html += '<li>' + inlineFormat(olLi[1]) + '</li>';
      continue;
    }

    // ── blank line — close any open lists ────────────────────
    if (line.trim() === '') { closeLists(); continue; }

    // ── paragraph ────────────────────────────────────────────
    closeLists();
    html += '<p>' + inlineFormat(line) + '</p>';
  }

  // flush any open block at EOF
  if (inCodeBlock) {
    var langAttrEof = codeLang ? ' class="lang-' + esc(codeLang) + '"' : '';
    html += '<pre><code' + langAttrEof + '>' + esc(codeBuffer.join('\n')) + '</code></pre>';
  }
  closeLists();
  closeBlockquote();
  return html;
}

function inlineFormat(text) {
  // Order matters: protect code spans first so their contents are not
  // re-formatted by later regexes.
  var placeholders = [];
  var s = String(text);
  s = s.replace(/`([^`]+)`/g, function(_, code) {
    placeholders.push('<code>' + esc(code) + '</code>');
    return '\u0000' + (placeholders.length - 1) + '\u0000';
  });

  s = esc(s);

  // links: [text](url) — open in new tab
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function(_, label, url) {
    return '<a href="' + url + '" target="_blank" rel="noopener">' + label + '</a>';
  });

  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  s = s.replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>');
  s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');

  // restore code spans
  s = s.replace(/\u0000(\d+)\u0000/g, function(_, idx) { return placeholders[parseInt(idx, 10)]; });
  return s;
}

function showDetail(unit) {
  var overlay = document.getElementById('detail-overlay');
  var content = document.getElementById('detail-content');

  var html = '<h2>' + esc(unit.title || unit.id) + '</h2>';
  html += '<div style="margin-bottom:16px">';
  html += '<span class="badge badge-' + esc(unit.status) + '">' + esc(unit.status) + '</span> ';
  html += '<span class="badge badge-domain">' + esc(unit.domain) + '</span> ';
  if (unit.file) html += '<span style="font-size:12px;color:#6b7280;margin-left:8px">' + esc(unit.file) + '</span>';
  html += '</div>';
  html += '<div class="md-content">' + renderMarkdown(unit.content) + '</div>';

  content.innerHTML = html;
  overlay.classList.add('visible');
  overlay.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('visible');
  document.body.style.overflow = '';
}

document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('detail-overlay').addEventListener('click', function(ev) {
  if (ev.target === this) closeDetail();
});
document.addEventListener('keydown', function(ev) {
  if (ev.key === 'Escape' && document.getElementById('detail-overlay').classList.contains('visible')) {
    closeDetail();
  }
});

document.getElementById('domains').addEventListener('click', function(ev) {
  var item = ev.target.closest('.domain-item');
  if (!item) return;
  activeDomain = item.getAttribute('data-domain');
  renderDomains();
  renderUnits();
});

document.getElementById('units').addEventListener('click', function(ev) {
  var card = ev.target.closest('.unit-card');
  if (!card) return;
  var id = card.getAttribute('data-id');
  var unit = allUnits.find(function(u) { return u.id === id; });
  if (unit) showDetail(unit);
});

fetch('/api/units')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    allUnits = d.units || [];
    allDomains = d.domains || [];
    renderDomains();
    renderUnits();
  })
  .catch(function(err) { toast('Failed to load history: ' + err.message, 'error'); });

/* ════════════════════════════════════════════
   Review System
   ════════════════════════════════════════════ */
var REVIEW_PAGE = 'history';
var _reviews = [];

function relativeTime(ts) {
  if (!ts) return '';
  var diff = Date.now() - new Date(ts).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  var days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function renderReviews() {
  var list = document.getElementById('review-list');
  var filtered = _reviews.filter(function(r) { return r.page === REVIEW_PAGE; });
  var countEl = document.getElementById('review-count');
  if (filtered.length > 0) { countEl.textContent = filtered.length; countEl.style.display = 'flex'; }
  else { countEl.style.display = 'none'; }
  if (filtered.length === 0) { list.innerHTML = '<div class="review-empty">No reviews yet for this page.</div>'; return; }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    html += '<div class="review-item' + (r.resolved ? ' resolved' : '') + '" data-review-id="' + escAttr(r._id) + '" data-resolved="' + (r.resolved ? 'true' : 'false') + '">';
    html += '<span class="review-author">' + esc(r.author) + '</span>';
    html += '<span class="review-time">' + esc(relativeTime(r.timestamp)) + '</span>';
    if (r.resolved) html += '<span class="review-resolved-tag">[resolved]</span>';
    if (r.context) html += '<div class="review-context">' + esc(r.context) + '</div>';
    html += '<div class="review-comment">' + esc(r.comment) + '</div>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function loadReviews() {
  fetch('/api/reviews').then(function(r) { return r.json(); }).then(function(d) { _reviews = d.reviews || []; renderReviews(); }).catch(function() {});
}

document.getElementById('review-list').addEventListener('click', function(ev) {
  var item = ev.target.closest('.review-item');
  if (!item) return;
  var id = item.getAttribute('data-review-id');
  var isResolved = item.getAttribute('data-resolved') === 'true';
  fetch('/api/reviews/' + encodeURIComponent(id), { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ resolved: !isResolved }) }).then(function() { loadReviews(); }).catch(function() {});
});

document.getElementById('review-submit').addEventListener('click', function() {
  var context = document.getElementById('review-context').value.trim();
  var author = document.getElementById('review-author').value.trim() || 'anonymous';
  var comment = document.getElementById('review-comment').value.trim();
  if (!comment) { toast('Please enter a comment', 'error'); return; }
  localStorage.setItem('birdview-review-author', author);
  var btn = document.getElementById('review-submit');
  btn.disabled = true; btn.textContent = 'Submitting...';
  fetch('/api/reviews', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ page: REVIEW_PAGE, context: context, author: author, comment: comment }) })
  .then(function(r) { return r.json(); }).then(function() { document.getElementById('review-context').value = ''; document.getElementById('review-comment').value = ''; btn.disabled = false; btn.textContent = 'Submit Review'; toast('Review submitted', 'success'); loadReviews(); })
  .catch(function(err) { btn.disabled = false; btn.textContent = 'Submit Review'; toast('Failed: ' + err.message, 'error'); });
});

document.getElementById('review-fab').addEventListener('click', function() { document.getElementById('review-panel').classList.add('open'); document.getElementById('review-overlay').classList.add('open'); renderReviews(); });
document.getElementById('review-panel-close').addEventListener('click', function() { document.getElementById('review-panel').classList.remove('open'); document.getElementById('review-overlay').classList.remove('open'); });
document.getElementById('review-overlay').addEventListener('click', function() { document.getElementById('review-panel').classList.remove('open'); document.getElementById('review-overlay').classList.remove('open'); });

var savedAuthor = localStorage.getItem('birdview-review-author');
if (savedAuthor) document.getElementById('review-author').value = savedAuthor;
loadReviews();
</script>
</body>
